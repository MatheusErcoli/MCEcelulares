version: '3.9'

services:

  frontend:
    build: ./Frontend

    volumes:
      - ./Frontend:/app
      - /app/node_modules

    command: npm run dev

    environment:
      PORT: 4000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"

    depends_on:
      - backend

  backend:
    build: ./Backend

    volumes:
      - ./Backend:/app
      - /app/node_modules

    command: npm run dev

    env_file:
      - ./Backend/.env

    environment:
      CHOKIDAR_USEPOLLING: "true"

    depends_on:
      - mysql

  nginx:
    image: nginx:latest

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl

    depends_on:
      - frontend
      - backend

  mysql:
    image: mysql:8

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: