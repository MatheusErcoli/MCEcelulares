services:

  frontend:
    build: ./Frontend

    volumes:
      - ./Frontend:/app
      - /app/node_modules

    command: npm run dev

    environment:
      PORT: 4000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"

    depends_on:
      - backend

  backend:
    build: ./Backend

    volumes:
      - ./Backend:/app
      - /app/node_modules

    command: npm run dev

    env_file:
      - ./Backend/.env

    environment:
      CHOKIDAR_USEPOLLING: "true"

    depends_on:
      mysql:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:latest

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl

    depends_on:
      - frontend
      - backend

  mysql:
    image: mysql:8

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data: